<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Item</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New Stock Item</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Tyre</label>
                            <input type="text" name="tyre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tube</label>
                            <input type="text" name="tube" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tyre Valve</label>
                            <input type="text" name="tyre_valve" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Stock Quantity</label>
                            <input type="number" name="stock_quantity" class="form-control" value="0" min="0">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Save Item
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
