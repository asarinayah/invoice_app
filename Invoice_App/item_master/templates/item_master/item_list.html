<!DOCTYPE html>
<html>
<head>
    <title>Item List</title>
</head>
<body>
    <h2>Item List</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Description</th>
            <th>Price</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.item_name }}</td>
            <td>{{ item.brand }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.description }}</td>
            <td>{{ item.unit_price }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No items found</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
