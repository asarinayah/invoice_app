<!-- invoices/templates/invoices/create_invoice.html -->
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% progressive_web_app_meta %}
    <meta charset="UTF-8">
    <title>Create Invoice</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .invoice-form {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .invoice-form h2 {
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .btn-submit {
            width: 100%;
        }
        .search-bar {
            max-width: 700px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>



<!-- Invoice Form -->
<div class="invoice-form">
    <h2>Create New Invoice</h2>
    <center><h3>XYZ Garage</h3></center>
    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="customer_name" class="form-label">Customer Name</label>
            <input type="text" class="form-control" name="customer_name" id="customer_name" required>
        </div>
        
        <div class="mb-3">
            <label for="phone_number" class="form-label">Mobile No</label>
            <input type="text" class="form-control" name="phone_number" id="phone_number" required>
        </div>

        <div class="mb-3">
            <label for="service_description" class="form-label">Services</label>
            <textarea class="form-control" name="service_description" id="service_description" rows="4" required></textarea>
        </div>

        <div class="mb-3">
            <label for="amount_due" class="form-label">Amount</label>
            <input type="number" class="form-control" name="amount_due" id="amount_due" step="0.01" required>
        </div>

        <!-- Discount Field -->
        <div class="mb-3">
            <label for="discount" class="form-label">Discount</label>
            <input type="number" class="form-control" name="discount" id="discount" step="0.01" value="0">
        </div>

        <!-- Tax Field (read-only, calculated dynamically in views/models) -->
        <div class="mb-3">
            <label for="tax" class="form-label">VAT (5%)</label>
            <input type="number" class="form-control" id="tax" step="0.01" value="0" readonly>
        </div>

        <!-- Total Field (optional, calculated dynamically) -->
        <div class="mb-3">
            <label for="total" class="form-label">Total Amount</label>
            <input type="number" class="form-control" id="total" step="0.01" value="0" readonly>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">Create Invoice</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Optional: "IF we will not use javascript, after submitting only we can see total amount after discount "
 Calculate VAT & total dynamically using JS -->
  
<script>
const amountInput = document.getElementById('amount_due');
const discountInput = document.getElementById('discount');
const taxInput = document.getElementById('tax');
const totalInput = document.getElementById('total');

function calculateTotals() {
    let amount = parseFloat(amountInput.value) || 0;
    let discount = parseFloat(discountInput.value) || 0;
    let subtotal = Math.max(amount - discount, 0);
    let tax = subtotal * 0.05;
    let total = subtotal + tax;

    taxInput.value = tax.toFixed(2);
    totalInput.value = total.toFixed(2);
}

amountInput.addEventListener('input', calculateTotals);
discountInput.addEventListener('input', calculateTotals);
</script>

</body>
</html>
