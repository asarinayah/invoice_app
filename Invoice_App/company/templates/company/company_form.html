{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% progressive_web_app_meta %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Company</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <div class="mb-4 border-bottom pb-2">
                        <h5 class="fw-semibold text-dark mb-1">
                            Company Information
                        </h5>
                        <small class="text-muted">
                            Please fill in the company details accurately
                        </small>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-medium">Company Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Registered company name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Phone Number</label>
                                <input type="text" name="phone_number" class="form-control" placeholder="+971 5X XXX XXXX" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Address</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Office address" required></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'create_company' %}" class="btn btn-light">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4">Save</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
